appId: com.duchitskyda.claudesync
productName: claudesync
directories:
  output: release
files:
  - 'out/**/*'
  - 'package.json'
asar: true
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.developer-tools
win:
  target:
    - target: nsis
    - target: portable
linux:
  target:
    - AppImage
  category: Development
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
